databases:
  - name: lingee-db
    plan: free
    databaseName: lingee
    user: lingee

services:
  - type: web
    name: lingee-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lingee-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
